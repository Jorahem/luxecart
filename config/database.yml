default: &default
  adapter: postgresql
  encoding: unicode
  host: 127.0.0.1
  port: 5432
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  username: postgres
  password: MyNewPgPass123!

development:
  <<: *default
  database: luxecart_development

test:
  <<: *default
  database: luxecart_test

production:
  <<: *default
  database: luxecart_production